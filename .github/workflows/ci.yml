name: CI

on:
  push:
    branches: ["frontend-game-mockup", "main"]
  pull_request:
    branches: ["frontend-game-mockup", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy Pillow matplotlib scikit-image pytest
          # pygame requires a display; install without running pygame tests
          pip install pygame --no-build-isolation || true

      - name: Run pipeline tests
        run: |
          python -m pytest tests/ --ignore=tests/test_gameworks_engine.py -v

      - name: Run gameworks engine tests (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          python -m pytest tests/test_gameworks_engine.py -v

      - name: Run demo tests
        run: |
          python -m pytest tests/demo/ -v
