name: CI

on:
  push:
    branches: ["frontend-game-mockup", "main", "working-changes"]
  pull_request:
    branches: ["frontend-game-mockup", "main", "working-changes"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy Pillow matplotlib scikit-image numba pydantic pytest pyflakes
          pip install pygame || true

      - name: Run pipeline tests
        run: |
          python -m pytest tests/ --ignore=tests/test_gameworks_engine.py --ignore=tests/demo/ -v

      - name: Run demo tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          python -m pytest tests/demo/ -v

      - name: Run gameworks engine tests (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          python -m pytest tests/test_gameworks_engine.py -v

      - name: Run gameworks full test suite (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          python -m pytest gameworks/tests/ -v
